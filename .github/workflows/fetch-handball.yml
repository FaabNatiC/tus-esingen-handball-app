name: Handball-Daten aktualisieren

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: Spielplan und Tabelle abrufen
        run: python scripts/fetch_handball.py

      - name: Änderungen committen
        run: |
          git config user.name "handball-bot"
          git config user.email "bot@tus-esingen.de"
          git add data/1-herren/ data/1-damen/
          git diff --staged --quiet || git commit -m "Daten aktualisiert: $(date '+%d.%m.%Y %H:%M')"
          git push
